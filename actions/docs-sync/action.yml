name: Sync nimpress docs
description: Mirror a source repo .nimpress folder into the docs tree and commit, tag, or open a pull request
inputs:
  token:
    description: A token that can push to the docs repo and open pull requests
    required: true
  docs-repo:
    description: Full name of the docs repo
    required: true
  docs-dir:
    description: Absolute path to the checked out docs repo
    required: true
  source-repo:
    description: Full name of the source repo
    required: true
  source-path:
    description: Absolute path to the checked out .nimpress folder
    required: true
  content-root:
    description: Absolute path to the docs content root the targets resolve under
    required: true
  mapping:
    description: Absolute path to nimpress.sources.json, optional
    required: false
    default: ""
  defaults:
    description: A json config object applied under each source, optional
    required: false
    default: ""
outputs:
  result:
    description: The outcome, one of pushed, pr, or none
    value: ${{ steps.sync.outputs.result }}
runs:
  using: composite
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - id: sync
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        NIMPRESS_TOKEN: ${{ inputs.token }}
        NIMPRESS_DOCS_REPO: ${{ inputs.docs-repo }}
        NIMPRESS_DOCS_DIR: ${{ inputs.docs-dir }}
        NIMPRESS_SOURCE_REPO: ${{ inputs.source-repo }}
        NIMPRESS_SOURCE: ${{ inputs.source-path }}
        NIMPRESS_CONTENT_ROOT: ${{ inputs.content-root }}
        NIMPRESS_MAPPING: ${{ inputs.mapping }}
        NIMPRESS_DEFAULTS: ${{ inputs.defaults }}
      run: go run .
